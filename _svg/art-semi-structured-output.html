<symbol id="art-prison-bars" viewBox="0 0 80 80" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <!-- soft shaded cell behind bars -->
  <rect x="10" y="8" width="60" height="64" fill="currentColor" fill-opacity=".08" stroke="none"/>
  <!-- bars -->
  <line x1="16" y1="8" x2="16" y2="72" stroke-width="1.6"/>
  <line x1="26" y1="8" x2="26" y2="72" stroke-width="1.6"/>
  <line x1="36" y1="8" x2="36" y2="72" stroke-width="1.6"/>
  <line x1="46" y1="8" x2="46" y2="72" stroke-width="1.6"/>
  <line x1="56" y1="8" x2="56" y2="72" stroke-width="1.6"/>
  <line x1="66" y1="8" x2="66" y2="72" stroke-width="1.6"/>
  <!-- top and bottom rails -->
  <line x1="10" y1="14" x2="70" y2="14" stroke-width="1.4"/>
  <line x1="10" y1="66" x2="70" y2="66" stroke-width="1.4"/>
  <!-- small figure's hands reaching through the bars from inside -->
  <path d="M30 47 Q33 44 36 47" stroke-width="1.3"/>
  <path d="M36 47 Q39 44 42 47" stroke-width="1.3"/>
  <!-- figure silhouette — just a head and curved shoulders behind the bars -->
  <circle cx="37" cy="37" r="6" fill="currentColor" fill-opacity=".15" stroke-width="1.2"/>
  <path d="M28 52 Q32 48 37 48 Q42 48 46 52" stroke-width="1.2"/>
</symbol>

<symbol id="art-puppet" viewBox="0 0 80 80" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <!-- control bar at top, held by unseen hand -->
  <line x1="24" y1="8" x2="56" y2="8" stroke-width="1.6"/>
  <!-- strings from control bar down to puppet head -->
  <line x1="31" y1="8" x2="31" y2="26" stroke-width=".9" stroke-dasharray="2 1.5"/>
  <line x1="49" y1="8" x2="49" y2="26" stroke-width=".9" stroke-dasharray="2 1.5"/>
  <!-- puppet head (upper) -->
  <path d="M24 26 Q24 16 40 16 Q56 16 56 26 L56 42 Q56 48 40 48 Q24 48 24 42 Z" fill="currentColor" fill-opacity=".12" stroke-width="1.5"/>
  <!-- eyes -->
  <circle cx="33" cy="32" r="2.5" fill="currentColor" fill-opacity=".6" stroke-width=".8"/>
  <circle cx="47" cy="32" r="2.5" fill="currentColor" fill-opacity=".6" stroke-width=".8"/>
  <!-- hinge joint line — where the jaw separates -->
  <line x1="24" y1="48" x2="56" y2="48" stroke-width="1.2" stroke-dasharray="3 1"/>
  <!-- lower jaw, open/dropped — showing the mouth is being operated -->
  <path d="M24 48 Q24 58 40 60 Q56 58 56 48" fill="currentColor" fill-opacity=".15" stroke-width="1.5"/>
  <!-- interior of open mouth — teeth suggestion -->
  <line x1="30" y1="50" x2="50" y2="50" stroke-width=".9" opacity=".5"/>
  <!-- string from jaw hinge to control bar -->
  <line x1="40" y1="60" x2="40" y2="68" stroke-width=".9" stroke-dasharray="2 1.5"/>
  <path d="M34 68 Q40 72 46 68" stroke-width="1.2"/>
</symbol>
