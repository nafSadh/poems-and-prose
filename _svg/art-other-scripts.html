<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║ AGENT RULE — DO NOT DELETE OLD SVGs WHEN REDESIGNING.                    ║
  ║                                                                          ║
  ║ When replacing a <symbol>, wrap the previous version as an HTML comment  ║
  ║ immediately above the new one:                                           ║
  ║                                                                          ║
  ║   <!~~ prev: <one-line note + git ref if recovered>                      ║
  ║   <symbol id="art-foo" viewBox="0 0 80 80">                              ║
  ║     ...old body, with inner <!~~...~~> markers stripped to plain text... ║
  ║   </symbol>                                                              ║
  ║   ~~>                                                                    ║
  ║   <symbol id="art-foo" viewBox="0 0 80 80">                              ║
  ║     ...new design...                                                     ║
  ║   </symbol>                                                              ║
  ║                                                                          ║
  ║ Why: Sadh iterates per-poem art across many sessions. A redesign may be  ║
  ║ the wrong direction; the previous version may turn out to be the keeper. ║
  ║ Once the file is saved without the old block, git only helps if there    ║
  ║ was an intermediate commit — and there usually isn't. See AGENT_README.  ║
  ║                                                                          ║
  ║ HTML comments cannot contain "──", so strip inner <!~~...~~> markers     ║
  ║ (leave the comment text as plain prose) before wrapping. The commented   ║
  ║ block does not render — both build.py and the browser ignore it.         ║
  ╚══════════════════════════════════════════════════════════════════════════╝
-->

<symbol id="art-seed-envelope" viewBox="0 0 80 80" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Seed packet: open envelope with seeds spilling out — blurbs waiting to germinate -->
  <g transform="translate(12 18)">
    <!-- envelope body -->
    <path d="M0 8 L28 0 L56 8 L56 46 L0 46 Z" fill="currentColor" fill-opacity=".08" stroke-width="1.5"/>
    <!-- envelope flap open -->
    <path d="M0 8 L28 22 L56 8" fill="none" stroke-width="1.4" opacity=".7"/>
    <!-- flap crease line -->
    <line x1="0" y1="8" x2="28" y2="0" stroke-width=".7" opacity=".35"/>
    <line x1="28" y1="0" x2="56" y2="8" stroke-width=".7" opacity=".35"/>
    <!-- inner text lines suggesting blurbs -->
    <line x1="8" y1="28" x2="36" y2="28" stroke-width=".7" opacity=".4"/>
    <line x1="8" y1="34" x2="30" y2="34" stroke-width=".7" opacity=".4"/>
    <line x1="8" y1="40" x2="40" y2="40" stroke-width=".7" opacity=".35"/>
  </g>
  <!-- seeds spilling out — small ovoid dots -->
  <ellipse cx="52" cy="52" rx="3.5" ry="2.2" transform="rotate(-20 52 52)" fill="currentColor" opacity=".7"/>
  <ellipse cx="60" cy="58" rx="3.5" ry="2.2" transform="rotate(15 60 58)" fill="currentColor" opacity=".65"/>
  <ellipse cx="44" cy="60" rx="3" ry="1.9" transform="rotate(-35 44 60)" fill="currentColor" opacity=".6"/>
  <ellipse cx="55" cy="66" rx="3" ry="2" transform="rotate(5 55 66)" fill="currentColor" opacity=".55"/>
  <ellipse cx="66" cy="50" rx="2.5" ry="1.6" transform="rotate(30 66 50)" fill="currentColor" opacity=".5"/>
  <!-- small scattered dot seeds -->
  <circle cx="68" cy="64" r="1.4" fill="currentColor" opacity=".45"/>
  <circle cx="40" cy="68" r="1.2" fill="currentColor" opacity=".4"/>
  <circle cx="72" cy="44" r="1" fill="currentColor" opacity=".38"/>
</symbol>

<symbol id="art-page-lines" viewBox="0 0 80 80" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- A single clean page: word → sentence → stanza → poem, meta-structural -->
  <!-- page shape -->
  <path d="M18 8 L52 8 L62 18 L62 72 L18 72 Z" fill="currentColor" fill-opacity=".06" stroke-width="1.5"/>
  <!-- folded corner -->
  <path d="M52 8 L52 18 L62 18" fill="currentColor" fill-opacity=".18" stroke-width="1.2"/>
  <!-- stanza one: 3 short lines (word / sentence / stanza) -->
  <line x1="24" y1="26" x2="36" y2="26" stroke-width="1.6" opacity=".75"/>
  <line x1="24" y1="32" x2="48" y2="32" stroke-width="1.2" opacity=".6"/>
  <line x1="24" y1="38" x2="44" y2="38" stroke-width="1.2" opacity=".6"/>
  <!-- stanza gap -->
  <!-- stanza two: 3 lines -->
  <line x1="24" y1="46" x2="50" y2="46" stroke-width="1.2" opacity=".55"/>
  <line x1="24" y1="52" x2="42" y2="52" stroke-width="1.2" opacity=".55"/>
  <line x1="24" y1="58" x2="46" y2="58" stroke-width="1.2" opacity=".5"/>
  <!-- closing couplet — shorter, decisive -->
  <line x1="24" y1="65" x2="34" y2="65" stroke-width="1.5" opacity=".8"/>
</symbol>
