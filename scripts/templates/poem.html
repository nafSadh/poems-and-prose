<div class="view view-read active">
  <nav class="bar">
    <a href="/" class="mark"><svg><use href="#bar-mark"/></svg>sadh</a>
    <span class="folio">Book {{ROMAN}} · {{INDEX_STR}} / {{COUNT_STR}}</span>
  </nav>
  <div class="page-wrap">
    <div class="head-wrap">
      <div class="head-inner">
        <div class="head-text">
          <div class="from">from <a class="{{FROM_CLASS}}" href="/{{COLLECTION_ID}}/">{{FROM_TITLE}}</a></div>
          <h1 class="{{TITLE_CLASS}}">{{POEM_TITLE}}</h1>
          {{DATE_LINE}}
        </div>
        <div class="head-art"><svg width="80" height="80"><use href="#{{TOP_ART}}"/></svg></div>
      </div>
    </div>
    <div class="poem-col">
      <article>
        <div class="body{{BODY_LANG_CLASS}}">
{{BODY_HTML}}
        </div>
        {{MOBILE_NOTE}}
      </article>
    </div>
    <aside class="margin-col">{{MARGIN_NOTE}}</aside>
    <div class="poem-nav">
{{POEM_NAV}}
    </div>
    <div class="back-link"><a href="/{{COLLECTION_ID}}/">all poems in {{COLLECTION_ROMAN_OR_TITLE}}</a></div>
  </div>
  <script>
  document.addEventListener('keydown', function(e){
    if(e.metaKey||e.ctrlKey||e.altKey||e.shiftKey) return;
    var t=e.target.tagName; if(t==='INPUT'||t==='TEXTAREA') return;
    var sel = e.key==='ArrowLeft' ? 'a.pn-link.prev'
            : e.key==='ArrowRight' ? 'a.pn-link.right' : null;
    if(!sel) return;
    var a=document.querySelector(sel);
    if(a && a.getAttribute('href')){ e.preventDefault(); location.href=a.getAttribute('href'); }
  });
  </script>
  <footer class="foot">
    <span>{{DOMAIN}}</span>
    <span class="sig">~ {{AUTHOR_LOWER}}</span>
    <a href="mailto:{{EMAIL}}">write</a>
  </footer>
</div>
